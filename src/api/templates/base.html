<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Second Brain</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --text: #e0e0e0;
            --text-muted: #8a8a9a;
            --accent: #e94560;
            --border: #2a2a4a;
            --blue: #4a9eff;
            --green: #4caf50;
            --purple: #b39ddb;
            --red: #ef5350;
            --gray: #9e9e9e;
            --gold: #ffd54f;
            --teal: #26a69a;
            --yellow: #ffee58;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 1.4rem; }

        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover { opacity: 0.85; }

        .htmx-request .refresh-btn { opacity: 0.5; cursor: wait; }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.2rem;
        }

        .panel h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }

        .search-box {
            width: 100%;
            padding: 0.6rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }

        .capture-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .capture-input {
            flex: 1;
            padding: 0.5rem 0.8rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
        }

        .capture-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .capture-btn {
            background: var(--green);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .type-chip {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.3rem;
        }

        .chip-blue { background: rgba(74, 158, 255, 0.2); color: var(--blue); }
        .chip-green { background: rgba(76, 175, 80, 0.2); color: var(--green); }
        .chip-purple { background: rgba(179, 157, 219, 0.2); color: var(--purple); }
        .chip-red { background: rgba(239, 83, 80, 0.2); color: var(--red); }
        .chip-gray { background: rgba(158, 158, 158, 0.2); color: var(--gray); }
        .chip-gold { background: rgba(255, 213, 79, 0.2); color: var(--gold); }
        .chip-teal { background: rgba(38, 166, 154, 0.2); color: var(--teal); }
        .chip-yellow { background: rgba(255, 238, 88, 0.2); color: var(--yellow); }

        .entry-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.8rem;
            margin-bottom: 0.6rem;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
        }

        .entry-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .entry-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .entry-summary {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        .permalink { text-decoration: none; font-size: 0.8rem; }

        .source-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            border-radius: 8px;
            margin-left: 0.3rem;
        }

        .badge-vector { background: rgba(74, 158, 255, 0.2); color: var(--blue); }
        .badge-keyword { background: rgba(76, 175, 80, 0.2); color: var(--green); }
        .badge-both { background: rgba(255, 213, 79, 0.2); color: var(--gold); }

        .score {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .copy-btn:hover { border-color: var(--text); color: var(--text); }

        .digest {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        .digest-item {
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .capture-prompt {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .capture-prompt p { margin-bottom: 1rem; }

        .loading { opacity: 0.5; }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-bottom: 1rem;
            align-items: center;
        }

        .filter-tab {
            font-size: 0.78rem;
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-tab:hover { border-color: var(--accent); color: var(--text); }
        .filter-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .filter-separator {
            color: var(--border);
            margin: 0 0.2rem;
        }

        /* Entry actions */
        .entry-actions {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .entry-card:hover { border-color: var(--accent); }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .action-btn:hover { border-color: var(--text); color: var(--text); }
        .action-danger:hover { border-color: var(--red); color: var(--red); }

        .reclassify-select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.72rem;
            padding: 0.15rem 0.2rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .reclassify-select:hover { border-color: var(--text); }

        /* Archived entry */
        .entry-archived {
            opacity: 0.6;
            border-style: dashed;
        }

        .archived-flash {
            text-align: center;
            padding: 0.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; height: 0; padding: 0; margin: 0; overflow: hidden; }
        }

        /* Edit form */
        .entry-editing {
            border-color: var(--accent);
        }

        .edit-row {
            margin-bottom: 0.6rem;
        }

        .edit-row label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .edit-input, .edit-textarea {
            width: 100%;
            padding: 0.4rem 0.6rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
        }

        .edit-input:focus, .edit-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .edit-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .save-btn {
            background: var(--green);
            color: white;
            border: none;
            padding: 0.35rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Entry title link */
        a.entry-title {
            color: var(--text);
            text-decoration: none;
        }

        a.entry-title:hover {
            text-decoration: underline;
            color: var(--blue);
        }

        /* Detail page */
        .detail-nav {
            margin-bottom: 1rem;
        }

        .back-link {
            color: var(--blue);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover { text-decoration: underline; }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .detail-header .entry-actions {
            opacity: 1;
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-section h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.3rem;
        }

        .raw-content {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            max-height: 400px;
            overflow-y: auto;
        }

        .meta-table {
            width: 100%;
            border-collapse: collapse;
        }

        .meta-table td {
            padding: 0.4rem 0.8rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .meta-table td:first-child {
            color: var(--text-muted);
            width: 120px;
            font-weight: 600;
        }

        .meta-table code {
            font-size: 0.78rem;
            background: var(--bg);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
        }

        /* Count badge */
        .count-badge {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Tools grid */
        .tools-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tool-link {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            transition: border-color 0.15s;
        }

        .tool-link:hover { border-color: var(--accent); }

        /* Eval page */
        .eval-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .eval-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
        }

        .eval-card h3 {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .eval-metric {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }

        .eval-metric:last-child { border-bottom: none; }

        .metric-label { color: var(--text-muted); }
        .metric-value { font-weight: 600; }
        .metric-good { color: var(--green); }
        .metric-ok { color: var(--gold); }
        .metric-bad { color: var(--red); }

        .eval-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 0.3rem;
            overflow: hidden;
        }

        .eval-bar-fill {
            height: 100%;
            border-radius: 3px;
        }

        footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🧠 Second Brain</h1>
        <div>
            <button class="refresh-btn"
                    hx-post="/refresh"
                    hx-target="body"
                    hx-indicator=".refresh-btn">
                🔄 Refresh
            </button>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>Second Brain MVP — Capture & Recall Loop</footer>

    <script>
        function copyToClipboard(title, summary) {
            navigator.clipboard.writeText(title + '\n' + summary).then(() => {
                event.target.textContent = '✓ Copied';
                setTimeout(() => { event.target.textContent = '📋 Copy'; }, 1500);
            });
        }
    </script>
</body>
</html>
