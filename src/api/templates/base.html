<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Second Brain{% block page_title %}{% endblock %}</title>

    <!-- Design System CSS -->
    <link rel="stylesheet" href="/static/css/main.css">

    <!-- CDN: Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- CDN: HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- CDN: Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body x-data="{ sidebarOpen: false }">

    <!-- Mobile overlay -->
    <div class="mobile-overlay"
         :class="{ 'active': sidebarOpen }"
         @click="sidebarOpen = false"></div>

    <div class="app-shell">
        <!-- ── Sidebar ─────────────────────────────────────────── -->
        <aside class="sidebar" :class="{ 'open': sidebarOpen }">
            <div class="sidebar-brand">
                <span style="font-size: 1.3rem;">🧠</span>
                <h1>Second Brain</h1>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-label">Main</div>
                    <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">
                        <span class="nav-icon">📊</span>
                        <span>Dashboard</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-label">Knowledge</div>
                    <a href="/entities" class="nav-link {% block nav_entities %}{% endblock %}">
                        <span class="nav-icon">🏗️</span>
                        <span>Entities</span>
                    </a>
                    <a href="/graph" class="nav-link {% block nav_graph %}{% endblock %}">
                        <span class="nav-icon">🔗</span>
                        <span>Knowledge Graph</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-label">Analysis</div>
                    <a href="/insights" class="nav-link {% block nav_insights %}{% endblock %}">
                        <span class="nav-icon">📈</span>
                        <span>Insights</span>
                    </a>
                    <a href="/eval" class="nav-link {% block nav_eval %}{% endblock %}">
                        <span class="nav-icon">🧪</span>
                        <span>Eval Harness</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                    🌓
                </button>
            </div>
        </aside>

        <!-- ── Main Content ────────────────────────────────────── -->
        <div class="main-content">
            <div class="page-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="mobile-toggle" @click="sidebarOpen = !sidebarOpen">☰</button>
                    <h2>{% block page_heading %}🧠 Second Brain{% endblock %}</h2>
                </div>
                <div class="header-actions">
                    {% block header_actions %}
                    <button class="btn btn-primary btn-sm"
                            hx-post="/refresh"
                            hx-target="body"
                            hx-indicator=".btn-primary">
                        🔄 Refresh
                    </button>
                    {% endblock %}
                </div>
            </div>

            <div class="page-body">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('sb-theme', next);
        }

        // Restore saved theme
        (function() {
            const saved = localStorage.getItem('sb-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();

        // Toast helper
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Copy to clipboard
        function copyToClipboard(title, summary) {
            navigator.clipboard.writeText(title + '\n' + summary).then(() => {
                showToast('Copied to clipboard');
            });
        }

        // Close sidebar on nav click (mobile)
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 768) {
                    document.querySelector('[x-data]').__x.$data.sidebarOpen = false;
                }
            });
        });
    </script>
</body>
</html>
