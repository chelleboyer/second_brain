<div class="capture-prompt">
    <p>No matches found for "{{ query }}". Want to capture a thought about it?</p>
    <form class="capture-form" hx-post="/capture" hx-target="#search-results" hx-swap="innerHTML" style="justify-content: center;">
        <input type="text" name="text" class="capture-input" value="{{ query }}" style="max-width: 400px;">
        <button type="submit" class="capture-btn">💾 Capture</button>
    </form>
</div>
